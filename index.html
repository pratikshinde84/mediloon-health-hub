<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ✅ Favicon (put your logo in public/favicon.ico) -->
    <link rel="icon" type="image/png" href="/favicon.ico" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ✅ Primary SEO -->
    <title>Mediloon – AI-Driven Autonomous Pharmacy</title>
    <meta
      name="description"
      content="Mediloon is an AI-powered autonomous pharmacy platform enabling smart medicine ordering, predictive refills, and intelligent health insights."
    />
    <meta name="author" content="Mediloon" />

    <!-- ✅ Open Graph (for sharing) -->
    <meta property="og:title" content="Mediloon – AI Pharmacy Platform" />
    <meta
      property="og:description"
      content="Experience the future of pharmacies with AI-driven ordering, smart refill predictions, and automated medicine management."
    />

    <meta property="og:image" content="/og-mediloon.png" />

    <meta name="twitter:card" content="summary_large_image" />

      name="twitter:description"
      content="AI-powered autonomous pharmacy for smart medicine ordering and predictive health insights."
    />
    <meta name="twitter:image" content="/og-mediloon.png" />

    <!-- ✅ Theme color (mobile browser top bar) -->

    <!-- ✅ Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <div id="root"></div>
